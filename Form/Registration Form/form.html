<html>
<head>
<title>College Event Registration Form</title>
</head>

<body bgcolor="skyblue">
<center>
<h2>College Event Registration Form</h2>
</center>

<form>
Student Name:<input type="text"><br><br>
Register Number:<input type="text"><br><br>
Email:<input type="email"><br><br>
Password:<input type="password"><br><br>
Date of Registration:<input type="date"><br><br>
Gender:<input type="radio" name="gender"> Male<input type="radio" name="gender"> Female<br><br>
Department:<select>
<option>Computer Science</option>
<option>Information Technology</option>
<option>Mathematics</option>
<option>Commerce</option>
</select><br><br>
Events Interested:
<input type="checkbox"> Coding Contest<br>
<input type="checkbox"> Paper Presentation<br>
<input type="checkbox"> Quiz Competition<br>
<input type="checkbox"> Poster Making<br><br>
Upload Photo:<input type="file"><br><br>
Address:<textarea rows="4" cols="30"></textarea><br><br>
<input type="submit" value="Register">
<input type="reset" value="Clear">
</form>
</body>
</html>
